<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { max-width: 350px; width: 100%; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .toggle-txt { margin-top: 15px; cursor: pointer; color: #ff4757; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2 id="title">Login</h2>
        <input type="text" id="user" placeholder="Enter Username">
        <input type="password" id="pass" placeholder="Enter Password">
        <button id="submit-btn">Submit</button>
        <p class="toggle-txt" id="toggle">New user? Register here</p>
        <br>
        <a href="index.html" style="color: #555; text-decoration: none; font-size: 14px;">← Back to Store</a>
    </div>

    <script>
        let isLogin = true;
        const title = document.getElementById('title');
        const toggle = document.getElementById('toggle');
        const submitBtn = document.getElementById('submit-btn');

        toggle.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? "Login" : "Register";
            toggle.innerText = isLogin ? "New user? Register here" : "Have an account? Login";
        };

        submitBtn.onclick = async () => {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const path = isLogin ? '/api/login' : '/api/register';

            if(!username || !password) return alert("Please fill all fields");

            try {
                const res = await fetch('http://localhost:5000' + path, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    if (isLogin) {
                        localStorage.setItem('username', username);
                        localStorage.setItem('userId', data.userId);
                        window.location.href = 'index.html'; // Redirect to home page
                    } else {
                        // Agar register hua h toh login view par wapas switch karein
                        toggle.click();
                    }
                } else { alert(data.error); }
            } catch (err) { alert("Server is offline!"); }
        };
    </script>
</body>
</html>
